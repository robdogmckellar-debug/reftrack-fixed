name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, format, test, build
    runs-on: ubuntu-latest
    env:
      # The verify chain never launches Electron (it only compiles/tests/builds),
      # so skip the large runtime binary download to keep CI fast.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + lint + format + test + build)
        run: npm run verify
